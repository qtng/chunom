  
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chunom.org</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://qtng.github.io/qatt-dc/js/navigation.js"></script>
  <script src="https://qtng.github.io/qatt-dc/js/renderer.js?2"></script>
  <script src="https://qtng.github.io/qatt-dc/js/parser.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://qtng.github.io/qatt-dc/js/supabase.js"></script>
  <style>
    body {
		background: #3a445c;
		color: #eee;
	}
    svg {
	    stroke: currentColor;
        stroke-width:5.75px;
	    stroke-linecap: round;
	    stroke-linejoin: round;
	    fill: transparent;
	    vertical-align: baseline;
	    display: inline-block;
        height: 2em;
		position: relative;
		top: -.2em;
    }
	code {
	    display: inline-block;
		vertical-align: baseline;
        font-family: inherit;
	    font-size: 1.5em;
		color: inherit;
    }
  </style>
</head>
<bod data-bs-theme="dark">
  <div class="container">
	<code>字喃</code>
    <tt>ch,y,,4 n,o,m</tt>
  </div>
  <script>
const parser = new VietnameseParser();
let renderer;
window.addEventListener("load", function(){
  renderer = new SvgGlyphRenderer({});
  const chars = [];
  Array.from(document.querySelectorAll("tt")).forEach(el => {
    let t = el.innerText;
    const type = Number(el.dataset.type || 0);
    el.innerHTML = "";
    el.dataset.codes = t;
    renderer.renderText(t, el, type);
    chars.push(el);
  });
  window.changetype = (type) => {
  	document.querySelector("body").setAttribute("data-type", (type || "0").toString());
  	localStorage.qattType = type;
  	chars.forEach((el) => {
  		const tp = Number((el.dataset.type == null ? type : el.dataset.type) || 0);
  		renderer.renderText(
  			tp?el.dataset.codes.replace(/\+/g,""):el.dataset.codes,
  			el,
  			tp
  		);
  	});
  };
});
  </script>
</body>
</html>
