<script>
/**
 * HighscoreApp Klasse zur Kapselung der Logik.
 * Verwendet die Supabase-Anbindung aus qatt-dc.
 */
class HighscoreApp {
  constructor() {
    this.container = document.getElementById('highscoreContainer');
    this.refreshBtn = document.getElementById('refreshBtn');
    this.errorAlert = document.getElementById('errorAlert');
    this.errorMessage = document.getElementById('errorMessage');
    
    // Annahme: supabaseClient wird durch qatt-dc/js/supabase.js bereitgestellt
    // Falls nicht, wird hier lokal eine Instanz erstellt
    this.client = typeof supabaseClient !== 'undefined' ? supabaseClient : null;
    
    this.init();
  }

  init() {
    if (!this.client) {
      this.showError("Supabase client không tìm thấy. Vui lòng cấu hình trong qatt-dc/js/supabase.js");
      return;
    }

    this.refreshBtn.addEventListener('click', () => this.fetchHighscores());
    this.fetchHighscores();
  }

  /**
   * Lädt die Highscores aus der Supabase-Tabelle
   */
  async fetchHighscores() {
    this.setLoading(true);
    this.errorAlert.classList.add('d-none');

    try {
      // Abfrage der Top 10 Highscores
      const { data, error } = await this.client
        .from('scores') // Name der Tabelle in Supabase
        .select('username, score')
        .order('score', { ascending: false })
        .limit(10);

      if (error) throw error;

      this.render(data);
    } catch (err) {
      console.error(err);
      this.showError("Không thể kết nối với máy chủ bảng điểm.");
    } finally {
      this.setLoading(false);
    }
  }

  /**
   * Erstellt die Tabellenzeilen basierend auf den Daten
   */
  render(data) {
    if (!data || data.length === 0) {
      this.container.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">Chưa có dữ liệu.</td></tr>';
      return;
    }

    this.container.innerHTML = data.map((item, index) => `
      <tr>
        <td class="ps-4 fw-bold text-secondary">${index + 1}</td>
        <td>${this.escape(item.username)}</td>
        <td class="text-end pe-4 fw-bold text-primary">${item.score.toLocaleString()}</td>
      </tr>
    `).join('');
  }

  setLoading(isLoading) {
    this.refreshBtn.disabled = isLoading;
    if (isLoading) {
      this.container.style.opacity = '0.5';
    } else {
      this.container.style.opacity = '1';
    }
  }

  showError(msg) {
    this.errorMessage.textContent = msg;
    this.errorAlert.classList.remove('d-none');
    this.container.innerHTML = '<tr><td colspan="3" class="text-center py-4">---</td></tr>';
  }

  escape(str) {
    if (!str) return 'Vô danh';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
}

// Initialisierung beim Laden der Seite
document.addEventListener('DOMContentLoaded', () => {
  new HighscoreApp();
});
</script>

</body>
</html>
