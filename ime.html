<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chữ Nôm Editor | VietIME</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link type="text/css" href="https://chunom.org/media/css/fonts/all.css" rel="stylesheet"/>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://qtng.github.io/vietime/vietime.js"></script>
    <script src="https://qtng.github.io/qatt-dc/js/navigation.js"></script>
    
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #typer-text {
            width: 100%;
            height: 100%;
            padding: 15px;
            font-size: 20pt;
            border: none;
            outline: none;
            background: transparent;
            color: #fff;
            resize: none;
        }
    </style>
</head>
<body>

<div class="container py-3 mt-2">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-11">
            
            <header class="text-center mb-3">
                <h1 class="h4 mb-1">Chữ Nôm Online Writer</h1>
            </header>

            <div class="row g-0 border rounded overflow-hidden" style="min-height:300px; height:60vh">
                <div id="typer-candidates" class="col-7 p-0">
                </div>
                <div id="typer-pad" class="col-5 border-start h-100">
                    <textarea id="typer-text"></textarea>
                </div>
            </div>

            <div class="card mt-3 bg-dark border-secondary">
                <div class="card-body p-2">
                    <div class="row g-2 text-center align-items-center">
                        <div class="col-4">
                            <div class="form-check form-switch d-inline-block">
                                <input class="form-check-input" type="checkbox" id="telex-select" checked>
                                <label class="form-check-label small" for="telex-select">Telex</label>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="form-check form-switch d-inline-block">
                                <input class="form-check-input" type="checkbox" id="return-select" checked>
                                <label class="form-check-label small" for="return-select">Enter</label>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="form-check form-switch d-inline-block">
                                <input class="form-check-input" type="checkbox" id="space-select" checked>
                                <label class="form-check-label small" for="space-select">Space</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        const $typer = $("#typer-text");
        const candidatesArea = document.getElementById("typer-candidates");

        const setupIME = () => {
            $typer.vietime({
                method: $('#telex-select').is(':checked') ? 1 : 0,
                candidate_list: true,
                position: "bottom",
                background: "rgba(255, 255, 255, .8)",
                grid_color: "#000",
                text_color: "#222",
                return_select: $('#return-select').is(':checked'),
                space_select: $('#space-select').is(':checked'),
                cached_dictionary: 'https://www.chunom.org/entry/base_chars/',
                dictionaries: ['https://www.chunom.org/entry/generated_chars/'],
                list_changed: function(container, items, page, pages, candidates){
                    candidatesArea.innerHTML = "";
                    container.appendTo(candidatesArea)
                },
                candidate_selected: function(glyph, word){
                    setTimeout(() => $typer.focus(), 100);
                    return glyph;
                }
            });
        };

        setupIME();

        $('.form-check-input').on('change', function() {
            setupIME()
        });

        $typer.focus();
    });
</script>

</body>
</html>
