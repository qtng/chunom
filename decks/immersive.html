<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://qtng.github.io/">
    <title>Chunom.org - Superlearning Immersive</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://chunom.org/media/css/fonts/all.css">
    <script src="qatt-dc/js/navigation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="qatt-dc/js/parser.js"></script>
    <script src="qatt-dc/js/renderer.js"></script>
    <script src="qatt-dc/js/supabase.js"></script>
    <script src="chunom/decks/audiomanager.js"></script>
    <style>
        :root {
            --nom-font-stack: 'Nom Na Tong Supplement', 'NomKhai-Supplement', 'Han-Nom Gothic Supplement', 'Radicals Supplement', 'pa', 'HanaMinA', 'HanaMinB', serif;
            --ui-color: white;
            --ui-bg-alpha: rgba(255, 255, 255, 0.1);
            --ui-border: rgba(255, 255, 255, 0.15);
            --ui-shadow: rgba(0, 0, 0, 0.8); 
            --accent-start: #FF69B4;
            --active-color: #0000aa; 
            --danger-color: #dc3545; 
        }

        .ui-theme-dark-bg { --ui-color: white; --ui-bg-alpha: rgba(255, 255, 255, 0.1); --ui-border: rgba(255, 255, 255, 0.15); --ui-shadow: rgba(0, 0, 0, 0.8); }
        .ui-theme-light-bg { --ui-color: black; --ui-bg-alpha: rgba(0, 0, 0, 0.05); --ui-border: rgba(0, 0, 0, 0.1); --ui-shadow: transparent; }

        body { background-color: #000; color: #f8f9fa; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; margin: 0; }

        #learning-view {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1.5s ease; background-color: var(--accent-start);
            cursor: pointer;
            outline: none !important;
        }
        #learning-view.active { opacity: 1; }
        .video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%); }
        
        #bg-video {
            min-width: 100%; min-height: 100%; width: auto; height: auto; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); object-fit: cover; filter: brightness(0.4) saturate(0.7) contrast(1.1);
            transition: filter 0.5s ease, opacity 1.5s ease; opacity: 0;
        }
        #bg-video.playing { opacity: 1; }
        #bg-video.inverted { filter: invert(1) brightness(0.7) saturate(0.5); }

        #color-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            mix-blend-mode: normal; opacity: 1; transition: background-color 8s ease-in-out, opacity 0.5s ease;
            pointer-events: none; background-color: var(--accent-start);
        }

        .stage { position: relative; width: 100%; height: 60vh; display: flex; align-items: center; justify-content: center; z-index: 10; margin-top: -50px; }
        .layer {
            position: absolute; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1s ease-in-out; color: var(--ui-color); text-shadow: 0 4px 15px var(--ui-shadow); opacity: 0;
            pointer-events: none;
        }
        .layer-show { opacity: 1 !important; transform: scale(1.4); transition: all 4s ease-in-out; }

        .nom-display-large { font-family: var(--nom-font-stack); font-size: 9rem; line-height: 1; }
        .nom-display-mini { font-family: var(--nom-font-stack); font-size: 4.5rem; margin-bottom: 1.5rem; opacity: 0.6; }
        
        .qatt-container svg { height: clamp(3.5rem, 12vw, 5rem); stroke: var(--ui-color); stroke-width: 9; fill: none; filter: drop-shadow(0 4px 8px var(--ui-shadow)); }
        .quocngu-text { font-size: 1.6em; font-weight: 300; background: var(--ui-bg-alpha); backdrop-filter: blur(8px); border: 1px solid var(--ui-border); border-radius: 100px; padding: 4px 25px; box-shadow: 0 4px 10px var(--ui-shadow); }

        /* Steuerung */
        .control-bar { position: absolute; bottom: 1.5rem; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; z-index: 2000; cursor: default; }
        .controls-pill { background: var(--ui-bg-alpha); backdrop-filter: blur(15px); padding: 0.35rem 0.8rem; border-radius: 100px; display: flex; align-items: center; gap: 0.25rem; box-shadow: 0 8px 24px rgba(0,0,0,0.4); border: 1px solid var(--ui-border); }
        
        .btn-minimal { 
            background: none; border: none; color: var(--ui-color); padding: 0.4rem; font-size: 1.1rem; 
            opacity: 0.4; 
            transition: opacity 0.3s ease, transform 0.3s ease, color 0.3s ease; 
            cursor: pointer; border-radius: 50%;
            outline: none !important;
            box-shadow: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Fokusringe visuell unterdrücken */
        .btn-minimal:focus, 
        .btn-minimal:active, 
        .btn-minimal:focus-visible {
            opacity: 0.4;
            outline: none !important;
            box-shadow: none !important;
        }

        /* Sticky Hover auf Touch verhindern */
        @media (hover: hover) {
            .btn-minimal:hover:not(.active):not(.active-danger) {
                opacity: 0.7;
            }
        }

        .btn-minimal.active { 
            opacity: 1 !important; 
            color: var(--active-color) !important;
            transform: scale(1.15);
        }

        .btn-minimal.active-danger {
            opacity: 1 !important;
            color: var(--danger-color) !important;
            transform: scale(1.15);
        }
        
        .credits-container { 
            height: 1.4em; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-top: 0.5rem; 
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; transition: opacity 1s ease;
        }
        .spinner-custom { width: 3rem; height: 3rem; border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #deck-info { display: none; text-align: center; margin-bottom: 2rem; padding: 0 20px; }
        #deck-title { font-size: 2.2rem; font-weight: 700; color: white; margin-bottom: 0.5rem; }
        #deck-meta { font-size: 1rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 2px; }

        #start-button {
            display: none; background: none; border: 2px solid white; color: white;
            padding: 15px 40px; border-radius: 50px; font-size: 1.2rem;
            text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s;
            cursor: pointer; margin-bottom: 1.5rem;
        }
        #start-button:hover { background: white; color: black; transform: scale(1.05); }

        .deck-index-card { background: rgba(20, 20, 20, 0.7) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15) !important; max-height: 45vh; overflow-y: auto; border-radius: 16px !important; }
        .index-item { border-color: rgba(255,255,255,0.08) !important; background: transparent !important; color: white !important; padding: 0.75rem 1.25rem !important; }
        .index-nom-cell { font-family: var(--nom-font-stack); font-size: 1.4rem; line-height: 1; min-width: 2.5rem; }
        .index-qn-cell { color: rgba(255,255,255,0.6); font-size: 0.95rem; font-weight: 300; }

        .audio-credits { font-size: 0.82rem; color: var(--ui-color); opacity: 0; transition: all 0.3s; display: flex; align-items: center; gap: 15px; cursor: pointer; pointer-events: none; }
        .audio-credits.visible { opacity: 0.6; pointer-events: auto; }
        .audio-credits i { color: inherit; } 
    </style>
</head>
<body>
    <div class="d-none nom-display-large">𡦂喃</div>

    <div id="loading-overlay">
        <div id="loader-spinner" class="spinner-custom"></div>
        <div id="deck-info">
            <h1 id="deck-title"></h1>
            <div id="deck-meta"></div>
        </div>
        
        <button id="start-button" onclick="app.engage()">
            <i class="bi bi-play-fill text-warning me-2"></i>Start Session
        </button>

        <div id="index-toggle-wrapper" class="d-none text-center">
            <a class="text-secondary small text-decoration-none" data-bs-toggle="collapse" href="#deck-index-collapse">
                Show Index <i class="bi bi-chevron-down"></i>
            </a>
            <div class="collapse mt-3" id="deck-index-collapse">
                <div class="card deck-index-card shadow-lg">
                    <ul class="list-group list-group-flush text-start" id="deck-index-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <div id="learning-view" tabindex="-1">
        <div class="video-container"><video id="bg-video" autoplay muted loop playsinline></video></div>
        <div id="color-overlay"></div>
        <div class="stage">
            <div id="nom-layer" class="layer"><div id="nom-display" class="nom-display-large"></div></div>
            <div id="details-layer" class="layer">
                <div id="nom-mini" class="nom-display-mini"></div>
                <div id="qatt-display" class="qatt-container"></div>
                <div id="quocngu-display" class="quocngu-text mt-3"></div>
            </div>
        </div>
        <div class="control-bar" onclick="event.stopPropagation()">
            <div class="controls-pill">
                <button class="btn-minimal" onclick="location.href='/chunom/decks/index.html'"><i class="bi bi-x-lg"></i></button>
                <div class="vr mx-2 opacity-25" style="height:20px;"></div>
                
                <button id="speak-toggle" class="btn-minimal" onclick="app.audio.toggleSpeech()"><i class="bi bi-volume-up"></i></button>
                <button id="binaural-toggle" class="btn-minimal" onclick="app.audio.toggleBinaural()"><i class="bi bi-headphones"></i></button>
                <div class="vr mx-2 opacity-25" style="height:20px;"></div>
                <button class="btn-minimal" onclick="app.audio.prevTrack()"><i class="bi bi-chevron-left"></i></button>
                <button id="music-toggle" class="btn-minimal" onclick="app.audio.toggleMusic()"><i class="bi bi-play-fill"></i></button>
                <button class="btn-minimal" onclick="app.audio.nextTrack()"><i class="bi bi-chevron-right"></i></button>
                <div class="vr mx-2 opacity-25" style="height:20px;"></div>
                <div class="dropdown dropup">
                    <button class="btn-minimal" data-bs-toggle="dropdown"><i class="bi bi-gear"></i></button>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow" id="settings-menu"></ul>
                </div>
            </div>
            <div class="credits-container"><div id="audio-credits" class="audio-credits" onclick="app.audio.nextTrack()"></div></div>
        </div>
    </div>

    <audio id="bg-audio"></audio>

    <script>
        const APP_CONFIG = {
            visuals: {
                luminous_spirit: { src: 'https://qtng.github.io/chunom/225845_tiny.mp4', theme: 'light', inv: true, label: 'Luminous Spirit' },
                triangles: { src: 'https://qtng.github.io/chunom/36028-408417039_tiny.mp4', theme: 'dark', inv: false, label: 'Triangles' },
                cosmic_breath: { src: 'https://qtng.github.io/chunom/225845_tiny.mp4', theme: 'dark', inv: false, label: 'Cosmic Breath' },
                none: { src: null, theme: 'light', inv: false, label: 'No Video' }
            },
            binaural: { alpha: { freq: 10, label: 'Alpha 10Hz' }, gamma: { freq: 40, label: 'Gamma 40Hz' }, none: { freq: 0, label: 'None' } },
            colors: ['#FF69B4', '#9B59B6', '#3498DB', '#1ABC9C', '#E67E22', '#E91E63', '#8E44AD', '#D35400'],
            playlist: [1, 4, 5, 6, 7, 12, 13, 14, 15, 16, 17],
            intervals: { cardSwitch: 4500, colorPulse: 15000, navHide: 7500 }
        };

        class SimpleEmitter {
            constructor() { this.events = {}; }
            on(evt, fn) { (this.events[evt] = this.events[evt] || []).push(fn); }
            emit(evt, data) { (this.events[evt] || []).forEach(fn => fn(data)); }
        }

        class VisualManager extends SimpleEmitter {
            constructor(videoEl, overlayEl, containerEl) {
                super();
                this.video = videoEl; this.overlay = overlayEl; this.view = containerEl;
                this.timer = null; this.colorIdx = 0;
                this.video.onplaying = () => {
                    this.video.classList.add('playing');
                    this.overlay.style.mixBlendMode = 'overlay';
                    this.overlay.style.opacity = '0.45';
                };
            }
            setSource(key) {
                const cfg = APP_CONFIG.visuals[key];
                localStorage.setItem('videoKey', key);
                this.video.classList.remove('playing');
                this.overlay.style.mixBlendMode = 'normal';
                this.overlay.style.opacity = '1';
                if (key === 'none') { this.video.pause(); } 
                else { this.video.src = cfg.src; this.video.classList.toggle('inverted', cfg.inv); this.video.load(); this.video.play().catch(()=>{}); }
                this.view.className = `active ${cfg.theme === 'dark' ? 'ui-theme-dark-bg' : 'ui-theme-light-bg'}`;
                this.emit('update', key);
            }
            startCycle() {
                if (this.timer) clearInterval(this.timer);
                const pulse = () => {
                    const nextColor = APP_CONFIG.colors[this.colorIdx];
                    this.overlay.style.backgroundColor = nextColor;
                    this.view.style.backgroundColor = nextColor;
                    this.colorIdx = (this.colorIdx + 1) % APP_CONFIG.colors.length;
                };
                pulse();
                this.timer = setInterval(pulse, APP_CONFIG.intervals.colorPulse);
            }
        }

        class SuperlearningApp {
            constructor() {
                this.sp = new SupabaseService(); 
                this.parser = new VietnameseParser(); 
                this.renderer = new SvgGlyphRenderer();
                const audioState = {
                    isMusicOn: localStorage.getItem('musicOn') !== 'false',
                    isSpeechOn: localStorage.getItem('speechOn') !== 'false',
                    isBinauralOn: localStorage.getItem('binauralOn') !== 'false',
                    binauralType: localStorage.getItem('binauralType') || 'alpha',
                    currentTrackIdx: 0
                };
                this.audio = new AudioManager(document.getElementById('bg-audio'), { playlist: APP_CONFIG.playlist, binaural: APP_CONFIG.binaural }, audioState);
                this.visual = new VisualManager(document.getElementById('bg-video'), document.getElementById('color-overlay'), document.getElementById('learning-view'));
                this.currentDeck = null; this.idx = 0; this.isFlipped = false; this.loop = null;
                this.qattType = localStorage.getItem('qattType') || "1"; 
                this.currentVideoKey = localStorage.getItem('videoKey') || 'luminous_spirit';
                this.navTimer = null;
                this.bindEvents();
            }

            bindEvents() {
                this.audio.on('update', (state) => {
                    localStorage.setItem('musicOn', state.isMusicOn); localStorage.setItem('speechOn', state.isSpeechOn);
                    localStorage.setItem('binauralOn', state.isBinauralOn); localStorage.setItem('binauralType', state.binauralType);
                    this.syncAudioUI(state); this.renderSettings(); this.updateCredits(state);
                });
                this.visual.on('update', (key) => { this.currentVideoKey = key; this.renderSettings(); });
                document.getElementById('learning-view').addEventListener('click', () => this.toggleNavbar());

                // Radikaler Fokus-Abbruch und Entfokussierung
                document.addEventListener('click', (e) => {
                    if (e.target.closest('.btn-minimal')) {
                        const view = document.getElementById('learning-view');
                        requestAnimationFrame(() => {
                            if (view) view.focus();
                        });
                    }
                }, true);
            }

            async init() {
                try {
                    await this.sp.init();
                    const urlParams = new URLSearchParams(window.location.search);
                    const deckId = urlParams.get('id') || "9222f66f-6d0e-4b2d-bfdd-f31ebea71337";
                    const deck = await this.sp.getDeck(deckId);
                    if (deck) {
                        this.currentDeck = { ...deck, words: deck.words.filter(w => w.n !== ".config") };
                        document.getElementById('deck-title').textContent = this.currentDeck.title;
                        document.getElementById('deck-meta').textContent = `${this.currentDeck.words.length} items`;
                        const indexList = document.getElementById('deck-index-list');
                        indexList.innerHTML = this.currentDeck.words.map(w => `
                            <li class="list-group-item index-item d-flex justify-content-between align-items-center">
                                <span class="index-nom-cell">${w.n}</span>
                                <span class="index-qn-cell">${w.qn}</span>
                            </li>
                        `).join('');
                        document.getElementById('loader-spinner').style.display = 'none';
                        document.getElementById('deck-info').style.display = 'block';
                        document.getElementById('start-button').style.display = 'block';
                        document.getElementById('index-toggle-wrapper').classList.remove('d-none');
                    }
                } catch (e) { console.error("Init fehlgeschlagen", e); }
            }

            engage() {
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0'; setTimeout(() => loader.remove(), 1000);
                document.getElementById('learning-view').classList.add('active');
                this.audio.init(); this.visual.startCycle(); this.visual.setSource(this.currentVideoKey);
                this.updateCard(); this.startAutoplay(); this.showNavbar();
            }

            showNavbar() {
                const nav = document.querySelector('.navbar'); if (!nav) return;
                nav.classList.remove('nav-hidden'); clearTimeout(this.navTimer);
                this.navTimer = setTimeout(() => this.hideNavbar(), APP_CONFIG.intervals.navHide);
            }
            hideNavbar() { const nav = document.querySelector('.navbar'); if (nav) nav.classList.add('nav-hidden'); }
            toggleNavbar() { const nav = document.querySelector('.navbar'); if (!nav) return; if (nav.classList.contains('nav-hidden')) this.showNavbar(); else this.hideNavbar(); }

            syncAudioUI(state) {
                const musicBtn = document.getElementById('music-toggle');
                if(musicBtn) {
                    musicBtn.innerHTML = state.isMusicOn ? '<i class="bi bi-pause-fill"></i>' : '<i class="bi bi-play-fill"></i>';
                    musicBtn.classList.toggle('active', state.isMusicOn);
                }
                const speakBtn = document.getElementById('speak-toggle');
                if (speakBtn) {
                    speakBtn.classList.remove('active', 'active-danger');
                    if (state.isSpeechOn) {
                        if (state.hasSpeechVoice === false) speakBtn.classList.add('active-danger');
                        else speakBtn.classList.add('active');
                    }
                }
                document.getElementById('binaural-toggle')?.classList.toggle('active', state.isBinauralOn && state.binauralType !== 'none');
            }

            updateCard() {
                const w = this.currentDeck.words[this.idx];
                this.isFlipped = false; 
                document.getElementById('nom-display').textContent = w.n;
                document.getElementById('nom-layer').className = 'layer layer-show';
                document.getElementById('details-layer').className = 'layer';
            }

            flip() {
                this.isFlipped = !this.isFlipped;
                const w = this.currentDeck.words[this.idx];
                const nomL = document.getElementById('nom-layer'), detL = document.getElementById('details-layer');
                if (this.isFlipped) {
                    document.getElementById('nom-mini').textContent = w.n;
                    document.getElementById('quocngu-display').textContent = w.qn;
                    const parts = this.parser.parse(w.qn);
                    const qContainer = document.getElementById('qatt-display');
                    if (parts) {
                        let code = this.qattType === "0" ? parts.code.replace(",", ",+") : parts.code;
                        const tmp = document.createElement('div');
                        this.renderer.renderText(code, tmp, this.qattType);
                        qContainer.innerHTML = tmp.innerHTML;
                    } else qContainer.innerHTML = "";
                    nomL.className = 'layer'; detL.className = 'layer layer-show';
                    this.audio.speak(w.qn);
                } else { nomL.className = 'layer layer-show'; detL.className = 'layer'; }
            }

            startAutoplay() {
                if (this.loop) clearInterval(this.loop);
                this.loop = setInterval(() => { 
                    if (!this.isFlipped) this.flip(); 
                    else { this.idx = (this.idx + 1) % this.currentDeck.words.length; this.updateCard(); } 
                }, APP_CONFIG.intervals.cardSwitch);
            }

            updateCredits(state) {
                const el = document.getElementById('audio-credits');
                let creditsParts = [];
                if (state.isSpeechOn) {
                    if (state.hasSpeechVoice === false) creditsParts.push(`<span class="badge rounded-pill bg-danger text-light fw-normal px-2">⚠️ No voice installed!</span>`);
                    else creditsParts.push(`<i class="bi bi-chat-left-text"></i> Voice`);
                }
                if (state.isBinauralOn && state.binauralType !== 'none') {
                    creditsParts.push(`<span class="badge rounded-pill bg-dark text-light fw-normal px-2">${APP_CONFIG.binaural[state.binauralType].label}</span>`);
                }
                if (state.isMusicOn) creditsParts.push(`<i class="bi bi-shuffle"></i> Track ${APP_CONFIG.playlist[state.currentTrackIdx]}`);
                el.innerHTML = creditsParts.join(' ');
                el.classList.toggle('visible', creditsParts.length > 0);
            }

            renderSettings() {
                const menu = document.getElementById('settings-menu'); if(!menu) return;
                const createItem = (label, type, val, action) => {
                    const active = (type === 'video' && this.currentVideoKey === val) || (type === 'binaural' && this.audio.state.binauralType === val) || (type === 'qatt' && this.qattType === val);
                    return `<li><button class="dropdown-item ${active?'fw-bold':''}" onclick="${action}">${active?'✓ ':''}${label}</button></li>`;
                };
                let vItems = Object.entries(APP_CONFIG.visuals).map(([k, v]) => createItem(v.label, 'video', k, `app.visual.setSource('${k}')`)).join('');
                let bItems = Object.entries(APP_CONFIG.binaural).map(([k, v]) => createItem(v.label, 'binaural', k, `app.audio.setBinaural('${k}')`)).join('');
                menu.innerHTML = `<li class="dropdown-header small text-uppercase">Visuals</li>${vItems}<li class="dropdown-divider"></li><li class="dropdown-header small text-uppercase">Focus</li>${bItems}<li class="dropdown-divider"></li><li class="dropdown-header small text-uppercase">Script Style</li>${createItem('Standard', 'qatt', '0', "app.setQattType('0')")}${createItem('Simplified', 'qatt', '1', "app.setQattType('1')")}`;
            }

            setQattType(t) { 
                this.qattType = t; localStorage.setItem('qattType', t);
                if (this.isFlipped) { this.isFlipped = false; this.flip(); } 
                this.renderSettings(); 
            }
        }

        const app = new SuperlearningApp();
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
