<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://qtng.github.io/">
    <title>Superlearning - Chữ Nôm & QATT</title>
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Nom Fonts -->
    <link rel="stylesheet" href="https://chunom.org/media/css/fonts/all.css">
    
    <style>
        :root {
            --nom-font-stack: 'Nom Na Tong Supplement', 'NomKhai-Supplement', 'Han-Nom Gothic Supplement', 'Radicals Supplement', 'pa', 'HanaMinA', 'HanaMinB', serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .nom-text {
            font-family: var(--nom-font-stack);
            font-size: 5rem;
            line-height: 1.2;
        }

        .qatt-container {
            height: 5rem;
            display: inline-block;
        }

        .qatt-container svg {
            height: 100%;
            stroke: #0d6efd;
            fill: none;
        }

        .card-perspective {
            perspective: 1000px;
            width: 100%;
            max-width: 600px;
            height: 400px;
            margin: 2rem auto;
        }

        .learning-card {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .learning-card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 1rem;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-back {
            transform: rotateY(180deg);
            background: #252525;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .hidden { display: none !important; }
        
        #error-container {
            position: fixed;
            top: 1rem; left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            width: 90%;
            max-width: 600px;
        }

        .debug-json {
            font-size: 0.75rem;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem;
            border-radius: 4px;
            margin-top: 0.5rem;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ff8888;
        }

        .auth-status-badge {
            font-size: 0.7rem;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 2px 10px;
            border-radius: 15px;
            color: #aaa;
            margin-top: 5px;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-dark">

    <div id="nav-container"></div>
    <div id="error-container"></div>

    <div id="loading" class="loading-overlay">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <div id="loading-text">Lade Superlearning...</div>
    </div>

    <div class="container py-5 mt-5">
        <div id="deck-selection" class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="mb-2 text-primary"><i class="bi bi-rocket-takeoff"></i> Superlearning</h1>
                <div id="user-display" class="auth-status-badge mb-4">Warte auf Datenbank...</div>
                
                <!-- Shared Deck Input -->
                <div class="card bg-dark border-secondary mb-5 shadow">
                    <div class="card-body text-start">
                        <h5 class="card-title text-secondary mb-3">Fremdes Deck laden</h5>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-secondary">ID</span>
                            <input type="text" id="share-id-input" class="form-control bg-dark text-light border-secondary" placeholder="UUID hier einfügen...">
                            <button class="btn btn-primary" onclick="app.loadSharedDeckById()">
                                <i class="bi bi-download"></i> Laden
                            </button>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0 text-secondary text-start">Deine Decks</h5>
                    <button class="btn btn-sm btn-outline-secondary" onclick="app.loadDecks()">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
                
                <div id="deck-list" class="list-group mb-4 text-start"></div>
            </div>
        </div>

        <div id="learning-view" class="hidden text-center">
            <div class="mb-3 d-flex justify-content-between align-items-center bg-dark p-2 rounded border border-secondary">
                <button class="btn btn-outline-secondary btn-sm" onclick="app.exitDeck()">
                    <i class="bi bi-arrow-left"></i> Ende
                </button>
                <div id="deck-info" class="text-truncate px-3 flex-grow-1">
                    <strong id="active-deck-title" class="text-primary"></strong>
                </div>
                <span id="progress-text" class="badge bg-dark border border-secondary text-secondary"></span>
            </div>

            <div class="card-perspective">
                <div id="main-card" class="learning-card" onclick="app.flipCard()">
                    <div class="card-face card-front">
                        <div id="nom-display" class="nom-text mb-3"></div>
                        <div class="text-secondary small mt-4">Klicken zum Umdrehen</div>
                    </div>
                    <div class="card-face card-back">
                        <div id="qatt-display" class="qatt-container mb-3"></div>
                        <h2 id="quocngu-display" class="display-4 mb-2 text-primary"></h2>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <div class="btn-group shadow">
                    <button class="btn btn-lg btn-outline-primary" onclick="app.prevCard()"><i class="bi bi-chevron-left"></i></button>
                    <button id="autoplay-btn" class="btn btn-lg btn-primary px-4" onclick="app.toggleAutoplay()"><i class="bi bi-play-fill"></i> Autoplay</button>
                    <button class="btn btn-lg btn-outline-primary" onclick="app.nextCard()"><i class="bi bi-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase SDK (MUSS vor supabase.js geladen werden) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="qatt-dc/js/parser.js"></script>
    <script src="qatt-dc/js/renderer.js"></script>
    <script src="qatt-dc/js/supabase.js"></script>
    <script src="qatt-dc/js/navigation.js"></script>

    <script>
        class SuperlearningApp {
            constructor() {
                this.sp = new SupabaseService();
                this.parser = new VietnameseParser();
                this.renderer = new SvgGlyphRenderer();
                this.decks = [];
                this.currentDeck = null;
                this.currentIndex = 0;
                this.isFlipped = false;
                this.autoplayInterval = null;
                this.qattType = localStorage.qattType || "0";

                window.addEventListener('keydown', (e) => {
                    if (!this.currentDeck) return;
                    if (e.code === 'Space') { e.preventDefault(); this.isFlipped ? this.nextCard() : this.flipCard(); }
                    if (e.code === 'ArrowRight') this.nextCard();
                    if (e.code === 'ArrowLeft') this.prevCard();
                });
            }

            async init() {
                const userDisplay = document.getElementById('user-display');
                try {
                    userDisplay.textContent = "Lade SDK...";
                    this.setLoading(true, "Initialisiere Datenbank...");
                    
                    // Prüfen ob Supabase SDK geladen wurde
                    if (typeof supabase === 'undefined') {
                        throw new Error("Supabase SDK (CDN) konnte nicht geladen werden. Bitte Internetverbindung prüfen.");
                    }

                    await this.sp.init();
                    
                    if (!this.sp.client) {
                        throw new Error("Supabase Client wurde im Service nicht erstellt. Prüfe URL und API-Key in supabase.js.");
                    }

                    // Auth Check
                    userDisplay.textContent = "Prüfe Sitzung...";
                    const { data, error: sessionError } = await this.sp.client.auth.getSession();
                    if (sessionError) throw sessionError;
                    
                    let session = data.session;

                    if (!session) {
                        userDisplay.textContent = "Melde anonym an...";
                        const { data: authData, error: authError } = await this.sp.client.auth.signInAnonymously();
                        if (authError) throw authError;
                        session = authData.session;
                    }

                    const userId = session?.user?.id;
                    userDisplay.innerHTML = userId 
                        ? `<i class="bi bi-person-fill text-success"></i> Aktiv: ${userId.substring(0,8)}...` 
                        : `<i class="bi bi-person-x text-warning"></i> Login fehlgeschlagen`;

                    const urlParams = new URLSearchParams(window.location.search);
                    const shareId = urlParams.get('share');
                    
                    if (shareId) {
                        await this.loadSharedDeckById(shareId);
                    } else {
                        await this.loadDecks();
                    }
                } catch (err) {
                    const errorMsg = err.message || "Unbekannter Fehler";
                    userDisplay.innerHTML = `<i class="bi bi-exclamation-triangle text-danger"></i> Fehler: ${errorMsg}`;
                    console.error("Superlearning Init Error:", err);
                    this.showError("Start fehlgeschlagen", err);
                } finally {
                    this.setLoading(false);
                }
            }

            setLoading(show, text = "") {
                const el = document.getElementById('loading');
                const txt = document.getElementById('loading-text');
                if (show) { el.classList.remove('hidden'); txt.textContent = text; }
                else { el.classList.add('hidden'); }
            }

            showError(msg, debugData = null) {
                const container = document.getElementById('error-container');
                const alert = document.createElement('div');
                alert.className = 'alert alert-danger alert-dismissible fade show shadow-lg border-0';
                let debugHtml = debugData ? `<pre class="debug-json"><code>${JSON.stringify(debugData, null, 2)}</code></pre>` : '';
                alert.innerHTML = `<div class="d-flex align-items-start"><i class="bi bi-exclamation-octagon-fill me-2 fs-4"></i><div><strong>${msg}</strong>${debugHtml}</div></div><button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
                container.appendChild(alert);
            }

            async loadDecks() {
                try {
                    this.decks = await this.sp.getDecks() || [];
                    const list = document.getElementById('deck-list');
                    list.innerHTML = this.decks.length === 0 
                        ? '<div class="p-3 text-secondary border border-secondary border-dashed rounded text-center">Keine eigenen Decks gefunden.</div>'
                        : '';

                    this.decks.forEach(deck => {
                        const btn = document.createElement('button');
                        btn.className = 'list-group-item list-group-item-action bg-dark text-light border-secondary d-flex justify-content-between align-items-center mb-2 rounded shadow-sm';
                        btn.innerHTML = `<div><strong class="text-primary">${deck.title || 'Unbenannt'}</strong><br><span class="small text-secondary">${deck.words?.length || 0} Begriffe</span></div><i class="bi bi-play-circle-fill text-primary fs-4"></i>`;
                        btn.onclick = () => this.startDeck(deck);
                        list.appendChild(btn);
                    });
                } catch (e) {
                    this.showError("Decks konnten nicht geladen werden", e);
                }
            }

            async loadSharedDeckById(externalId = null) {
                const id = externalId || document.getElementById('share-id-input').value.trim();
                if (!id) return;
                this.setLoading(true, "Lade Deck...");
                try {
                    const deck = await this.sp.getDeck(id);
                    if (deck?.words?.length > 0) {
                        this.startDeck(deck);
                        if (!externalId) document.getElementById('share-id-input').value = '';
                    } else {
                        this.showError("Deck nicht gefunden", { id, response: deck });
                    }
                } catch (e) {
                    this.showError("Netzwerkfehler beim Laden", e);
                } finally {
                    this.setLoading(false);
                }
            }

            startDeck(deck) {
                this.currentDeck = deck;
                this.currentIndex = 0;
                this.isFlipped = false;
                document.getElementById('deck-selection').classList.add('hidden');
                document.getElementById('learning-view').classList.remove('hidden');
                document.getElementById('active-deck-title').textContent = deck.title;
                this.updateCard();
            }

            exitDeck() {
                this.stopAutoplay();
                document.getElementById('learning-view').classList.add('hidden');
                document.getElementById('deck-selection').classList.remove('hidden');
                this.currentDeck = null;
                this.loadDecks();
            }

            updateCard() {
                if (!this.currentDeck) return;
                const word = this.currentDeck.words[this.currentIndex];
                document.getElementById('main-card').classList.remove('is-flipped');
                this.isFlipped = false;
                document.getElementById('nom-display').textContent = word.n || "?";
                document.getElementById('quocngu-display').textContent = word.q || "";
                document.getElementById('progress-text').textContent = `${this.currentIndex + 1} / ${this.currentDeck.words.length}`;
                const qattEl = document.getElementById('qatt-display');
                qattEl.innerHTML = '';
                if (word.q) {
                    const parts = this.parser.parse(word.q);
                    if (parts) {
                        let code = parts.code;
                        if (this.qattType === "0") code = code.replace(",", ",+");
                        this.renderer.renderText(code, qattEl, this.qattType);
                    }
                }
            }

            flipCard() {
                this.isFlipped = !this.isFlipped;
                document.getElementById('main-card').classList.toggle('is-flipped', this.isFlipped);
            }

            nextCard() {
                if (!this.currentDeck) return;
                this.currentIndex = (this.currentIndex + 1) % this.currentDeck.words.length;
                this.updateCard();
            }

            prevCard() {
                if (!this.currentDeck) return;
                this.currentIndex = (this.currentIndex - 1 + this.currentDeck.words.length) % this.currentDeck.words.length;
                this.updateCard();
            }

            toggleAutoplay() {
                this.autoplayInterval ? this.stopAutoplay() : this.startAutoplay();
            }

            startAutoplay() {
                document.getElementById('autoplay-btn').innerHTML = '<i class="bi bi-pause-fill"></i> Stop';
                document.getElementById('autoplay-btn').classList.replace('btn-primary', 'btn-danger');
                this.autoplayInterval = setInterval(() => {
                    if (!this.isFlipped) this.flipCard();
                    else this.nextCard();
                }, 4000);
            }

            stopAutoplay() {
                document.getElementById('autoplay-btn').innerHTML = '<i class="bi bi-play-fill"></i> Autoplay';
                document.getElementById('autoplay-btn').classList.replace('btn-danger', 'btn-primary');
                if (this.autoplayInterval) { clearInterval(this.autoplayInterval); this.autoplayInterval = null; }
            }
        }

        const app = new SuperlearningApp();
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
