<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://qtng.github.io/">
    <title>Chunom.org - Superlearning</title>
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Nom Fonts -->
    <link rel="stylesheet" href="https://chunom.org/media/css/fonts/all.css">
    
    <style>
        :root {
            --nom-font-stack: 'Nom Na Tong Supplement', 'NomKhai-Supplement', 'Han-Nom Gothic Supplement', 'Radicals Supplement', 'pa', 'HanaMinA', 'HanaMinB', serif;
        }

        /* --- STARTSEITE (Bootstrap Dark Mode) --- */
        body {
            background-color: #121212;
            color: #f8f9fa;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .deck-card-list .list-group-item {
            background: #1e1e1e;
            border-color: #333;
            color: #eee;
            margin-bottom: 0.5rem;
            border-radius: 0.75rem !important;
            transition: all 0.2s;
        }
        .deck-card-list .list-group-item:hover {
            background: #252525;
            border-color: #0d6efd;
        }

        .auth-status-badge {
            font-size: 0.7rem;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 4px 12px;
            border-radius: 20px;
            color: #888;
            display: inline-block;
        }

        /* Kompakte Empty State Box */
        .empty-state-box {
            padding: 1.5rem;
            text-align: center;
            color: #555;
            border: 1px dashed #333;
            border-radius: 0.75rem;
            background: #181818;
        }

        /* --- PLAY MODUS (Hotpink Sphärisch) --- */
        #learning-view {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: hotpink;
            color: black;
            z-index: 9999;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #learning-view.active {
            display: flex;
            opacity: 1;
        }

        .stage {
            position: relative;
            width: 100%;
            height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 1s ease-in-out;
            transform: scale(1, 1);
            pointer-events: none;
        }

        #nom-layer { opacity: 0 }
        #details-layer { opacity: 0 }
        
        .layer-show {
        	opacity:1!important;
			transform-origin: top center;
        	transform: scale(1.5, 1.5);
        	transition: all 3s ease-in-out;
        }

        .nom-display-large {
            font-family: var(--nom-font-stack);
            font-size: 8rem;
            line-height: 1;
        }

        .nom-display-mini {
            font-family: var(--nom-font-stack);
            font-size: 5rem;
            margin-bottom: 2rem;
            opacity: 0.6;
        }

        .qatt-container {
            height: clamp(4rem, 15vw, 6rem);
            margin-bottom: 1.5rem;
        }
        .qatt-container svg {
            height: 100%;
            stroke: black;
            stroke-width: 9;
            fill: none;
        }
        .quocngu-text {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 300;
            text-transform: lowercase;
            background: black;
            color: white;
            border-radius: 100px;
        }

        #autoplay-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            color: rgba(0,0,0,0.15);
        }

        .control-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 2.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10000;
        }

        .btn-minimal {
            background: none;
            border: none;
            color: black;
            padding: 0.6rem;
            font-size: 1.3rem;
            opacity: 0.5;
            transition: all 0.2s;
        }
        .btn-minimal:hover { opacity: 1; transform: scale(1.1); }

        .controls-left, .controls-right { display: flex; gap: 1.2rem; align-items: center; }
        .hidden { display: none !important; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>

	<div style="font-family: var(--nom-font-stack)">...</div>
    <div id="loading" class="loading-overlay">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <!-- STARTSEITE -->
    <div class="container py-5 mt-5" id="deck-selection">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="display-4 mb-2 fw-bold">Superlearning</h1>
                <div id="user-display" class="auth-status-badge mb-5">Initialisiere...</div>
                
                <div class="card bg-dark border-secondary mb-5 shadow text-start">
                    <div class="card-body p-4">
                        <h5 class="card-title text-secondary mb-3 small text-uppercase fw-bold">Fremdes Deck laden</h5>
                        <div class="input-group">
                            <input value="9222f66f-6d0e-4b2d-bfdd-f31ebea71337" type="text" id="share-id-input" class="form-control bg-dark text-light border-secondary" placeholder="UUID hier einfügen...">
                            <button class="btn btn-primary px-4" onclick="app.loadSharedDeckById()">Laden</button>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0 text-secondary text-start small text-uppercase fw-bold">Deine Sammlungen</h5>
                    <button class="btn btn-sm btn-outline-secondary border-0" onclick="app.loadDecks()">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
                
                <div id="deck-list" class="list-group deck-card-list text-start mb-5"></div>
            </div>
        </div>
    </div>

    <!-- PLAY MODUS -->
    <div id="learning-view" class="is-front">
        <div id="autoplay-indicator"></div>
        
        <div class="stage" onclick="app.toggleAutoplay()">
            <div id="nom-layer" class="layer">
                <div id="nom-display" class="nom-display-large"></div>
            </div>
            
            <div id="details-layer" class="layer">
                <div id="nom-mini" class="nom-display-mini"></div>
                <div id="qatt-display" class="qatt-container"></div>
                <div id="quocngu-display" class="quocngu-text"></div>
            </div>
        </div>

        <div class="control-bar">
            <div class="controls-left">
                <button class="btn-minimal" onclick="app.exitDeck()" title="Beenden"><i class="bi bi-x-lg"></i></button>
                <button id="music-btn" class="btn-minimal" onclick="app.toggleMusic()" title="Musik"><i class="bi bi-music-note-beamed"></i></button>
                <button class="btn-minimal" onclick="app.speakWord()" title="Aussprache"><i class="bi bi-volume-up"></i></button>
                <div class="dropdown">
                    <button class="btn-minimal" data-bs-toggle="dropdown"><i class="bi bi-gear"></i></button>
                    <ul class="dropdown-menu dropdown-menu-dark shadow border-0">
                        <li><button class="dropdown-item" onclick="app.setQattType('0')">Traditionell</button></li>
                        <li><button class="dropdown-item" onclick="app.setQattType('1')">Vereinfacht V1</button></li>
                        <li><button class="dropdown-item" onclick="app.setQattType('2')">Vereinfacht V2</button></li>
                    </ul>
                </div>
            </div>
            <div class="controls-right">
                <button class="btn-minimal" onclick="app.prevCard()" title="Zurück"><i class="bi bi-chevron-left"></i></button>
                <button id="autoplay-btn" class="btn-minimal" onclick="app.toggleAutoplay()" title="Autoplay"><i class="bi bi-play-fill"></i></button>
                <button class="btn-minimal" onclick="app.nextCard()" title="Vorwärts"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg">
    </audio>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="qatt-dc/js/parser.js"></script>
    <script src="qatt-dc/js/renderer.js"></script>
    <script src="qatt-dc/js/supabase.js"></script>
    <script src="qatt-dc/js/navigation.js"></script>

    <script>
        class SuperlearningApp {
            constructor() {
                this.sp = new SupabaseService();
                this.parser = new VietnameseParser();
                this.renderer = new SvgGlyphRenderer();
                this.decks = [];
                this.currentDeck = null;
                this.currentIndex = 0;
                this.isShowingDetails = false;
                this.autoplayInterval = null;
                this.qattType = localStorage.qattType || "0";
                this.isMusicPlaying = false;
                this.setupKeyboard();
            }

            setupKeyboard() {
                window.addEventListener('keydown', (e) => {
                    if (!this.currentDeck) return;
                    if (e.code === 'Space' || e.code === 'Enter') { 
                        e.preventDefault(); 
                        this.toggleAutoplay();
                    }
                    if (e.code === 'ArrowRight') this.nextCard();
                    if (e.code === 'ArrowLeft') this.prevCard();
                });
            }

            async init() {
                try {
                    await this.sp.init();
                    const username = this.sp.defaultUsername()
                    if(this.sp.user) document.getElementById('user-display').textContent = `User: ${username }`;
                    await this.loadDecks();
                } catch (err) { console.error(err); }
                finally { document.getElementById('loading').classList.add('hidden'); }
            }

            async loadDecks() {
                try {
                    this.decks = await this.sp.getDecks() || [];
                    const list = document.getElementById('deck-list');
                    list.innerHTML = '';
                    
                    if (this.decks.length === 0) {
                        list.innerHTML = `
                            <div class="empty-state-box">
                                <p class="small mb-0">Xou have no decks, yet.</p>
                            </div>`;
                        return;
                    }

                    this.decks.forEach(deck => {
                        const btn = document.createElement('button');
                        btn.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center';
                        const wordCount = deck.count || 0;
                        btn.innerHTML = `<div><strong>${deck.title}</strong><br><span class="small text-secondary">${wordCount} Begriffe</span></div><i class="bi bi-play-circle-fill fs-4 text-primary opacity-50"></i>`;
                        btn.onclick = () => this.startDeck(deck);
                        list.appendChild(btn);
                    });
                } catch (e) { console.error(e); }
            }

            async loadSharedDeckById(id) {
                const finalId = id || document.getElementById('share-id-input').value.trim();
                if (!finalId) return;
                try {
                    const deck = await this.sp.getDeck(finalId);
                    if (deck) this.startDeck(deck);
                } catch (e) { console.error(e); }
            }

            startDeck(deck) {
                this.currentDeck = {
                    ...deck,
                    words: (deck.words || []).filter(w => w.n !== ".config")
                };
                this.currentIndex = 0;
                document.getElementById('learning-view').classList.add('active');
                document.body.style.overflow = 'hidden';
                this.updateCard();
                this.startAutoplay();
            }

            exitDeck() {
                this.stopAutoplay();
                document.getElementById('learning-view').classList.remove('active');
                setTimeout(() => document.getElementById('learning-view').style.display = 'none', 500);
                document.body.style.overflow = 'auto';
                this.currentDeck = null;
                this.loadDecks();
            }

            updateCard() {
                if (!this.currentDeck || !this.currentDeck.words.length) return;
                const word = this.currentDeck.words[this.currentIndex];
                const view = document.getElementById('learning-view');
                
                this.isShowingDetails = false;
                //view.classList.remove('show-details', 'is-back');
                //view.classList.add('is-front');
                
                const char = word.n || "?";
                document.getElementById('nom-display').dataset.value = char;
                document.getElementById('nom-display').textContent = char;
                document.getElementById('nom-mini').dataset.value = char;
                document.getElementById('quocngu-display').dataset.value = word.qn || "";
                
                const qattEl = document.getElementById('qatt-display');
                if (word.qn) {
                    const parts = this.parser.parse(word.qn);
                    if (parts) {
                        let code = parts.code;
                        if (this.qattType === "0") code = code.replace(",", ",+");
                        const el = document.createElement("div");
                        this.renderer.renderText(code, el, this.qattType);
                        qattEl.dataset.value = el.innerHTML;
                    }
                }
                
                document.getElementById('nom-layer').classList.add("layer-show");
                document.getElementById('details-layer').classList.remove("layer-show");
            }

            flipInternal() {
                this.isShowingDetails = !this.isShowingDetails;
                const view = document.getElementById('learning-view');
                const nom = document.getElementById("nom-layer");
                const details = document.getElementById("details-layer");
                
                const nomDisplay = document.getElementById('nom-display');
                const nomMini = document.getElementById('nom-mini');
                const qnDisplay = document.getElementById('quocngu-display');
                const qattDisplay = document.getElementById('qatt-display');
                
                if (this.isShowingDetails) {
                	nomMini.textContent = nomMini.dataset.value;
                	qnDisplay.textContent = qnDisplay.dataset.value;
                	qattDisplay.innerHTML = qattDisplay.dataset.value;
                	nom.classList.remove("layer-show");
                    details.classList.add("layer-show");
                    
                } else {
                	nomDisplay.textContent = nomDisplay.dataset.value;
                    nom.classList.add("layer-show");
                    details.classList.remove("layer-show");
                }
            }

            nextCard() {
                if (!this.currentDeck || !this.currentDeck.words.length) return;
                this.currentIndex = (this.currentIndex + 1) % this.currentDeck.words.length;
                this.updateCard();
            }

            prevCard() {
                if (!this.currentDeck || !this.currentDeck.words.length) return;
                this.currentIndex = (this.currentIndex - 1 + this.currentDeck.words.length) % this.currentDeck.words.length;
                this.updateCard();
            }

            toggleAutoplay() {
                if (this.autoplayInterval) {
                    this.stopAutoplay();
                    this.showIndicator('bi-pause-fill');
                } else {
                    this.startAutoplay();
                    this.showIndicator('bi-play-fill');
                }
            }

            showIndicator(iconClass) {
                const indicator = document.getElementById('autoplay-indicator');
                indicator.innerHTML = `<i class="bi ${iconClass}"></i>`;
                indicator.style.opacity = "1";
                indicator.style.transform = "translate(-50%, -50%) scale(1.5)";
                setTimeout(() => {
                    indicator.style.opacity = "0";
                    indicator.style.transform = "translate(-50%, -50%) scale(1)";
                }, 800);
            }

            startAutoplay() {
                if (this.autoplayInterval) return;
                document.getElementById('autoplay-btn').innerHTML = '<i class="bi bi-pause-fill"></i>';
                this.autoplayInterval = setInterval(() => {
                    if (!this.isShowingDetails) this.flipInternal();
                    else this.nextCard();
                }, 4000);
            }

            stopAutoplay() {
                document.getElementById('autoplay-btn').innerHTML = '<i class="bi bi-play-fill"></i>';
                if (this.autoplayInterval) {
                    clearInterval(this.autoplayInterval);
                    this.autoplayInterval = null;
                }
            }

            toggleMusic() {
                const audio = document.getElementById('bg-audio');
                if (this.isMusicPlaying) audio.pause();
                else audio.play().catch(() => {});
                this.isMusicPlaying = !this.isMusicPlaying;
                document.getElementById('music-btn').classList.toggle('opacity-100', this.isMusicPlaying);
            }

            speakWord() {
                if (!this.currentDeck || !this.currentDeck.words.length) return;
                const utterance = new SpeechSynthesisUtterance(this.currentDeck.words[this.currentIndex].qn);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }

            setQattType(type) {
                this.qattType = type;
                localStorage.qattType = type;
                this.updateCard();
            }
        }

        const app = new SuperlearningApp();
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
