<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://qtng.github.io/">
    <title>Chunom.org - Superlearning</title>
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Nom Fonts -->
    <link rel="stylesheet" href="https://chunom.org/media/css/fonts/all.css">
    
    <style>
        :root {
            --nom-font-stack: 'Nom Na Tong Supplement', 'NomKhai-Supplement', 'Han-Nom Gothic Supplement', 'Radicals Supplement', 'pa', 'HanaMinA', 'HanaMinB', serif;
        }

        body {
            background-color: #0a0a0a;
            color: #f8f9fa;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* --- START PAGE --- */
        .deck-card-list .list-group-item {
            background: #1e1e1e;
            border-color: #333;
            color: #eee;
            margin-bottom: 0.5rem;
            border-radius: 0.75rem !important;
            transition: all 0.2s;
        }
        .deck-card-list .list-group-item:hover {
            background: #252525;
            border-color: #0d6efd;
        }

        .auth-status-badge {
            font-size: 0.7rem;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 4px 12px;
            border-radius: 20px;
            color: #888;
            display: inline-block;
        }

        /* --- IMMERSIVE MODE --- */
        #learning-view {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            background-color: hotpink; 
            transition: opacity 0.6s ease, background-color 8s ease-in-out;
            overflow: hidden;
        }

        #learning-view.active {
            display: flex;
            opacity: 1;
        }

        /* --- CONTENT --- */
        .stage {
            position: relative;
            width: 100%;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            /* Um weitere 50px nach oben verschoben (total -100px) */
            margin-top: -100px;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-origin: center center;
            transition: all 1s ease-in-out;
            transform: scale(1, 1);
            pointer-events: none;
            color: black;
        }

        #nom-layer { opacity: 0 }
        #details-layer { opacity: 0 }
        
        .layer-show {
            opacity: 1 !important;
            transform: scale(1.4, 1.4);
            transition: all 4s ease-in-out;
        }

        .nom-display-large {
            font-family: var(--nom-font-stack);
            font-size: 9rem;
            line-height: 1;
        }

        .nom-display-mini {
            font-family: var(--nom-font-stack);
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        .qatt-container {
            height: clamp(3.5rem, 12vw, 5rem);
            margin-bottom: 1.2rem;
        }
        .qatt-container svg {
            height: 100%;
            stroke: black;
            stroke-width: 6px;
			stroke-linejoin: round;
			stroke-linecap: square;
            fill: none;
        }
        .quocngu-text {
            font-size: 1.6em;
            font-weight: 300;
            text-transform: lowercase;
            background: rgba(0, 0, 0, 0.07);
            border-radius: 100px;
            padding: 4px 25px;
        }

        /* --- CONTROL BAR --- */
        .control-bar {
            position: absolute;
            bottom: 1.5rem; 
            left: 0; right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10000;
            padding: 0 10px;
        }

        .controls-pill {
            background: rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0.35rem 0.8rem;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        .credits-container {
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 0.4rem;
            width: 100%;
        }

        .audio-credits {
            font-size: 0.82rem;
            color: rgba(0,0,0,0.45);
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .audio-credits.visible { opacity: 1; pointer-events: auto; }
        .audio-credits:hover { color: black; }

        .alpha-badge {
            background: rgba(0,0,0,0.06);
            padding: 1px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 0.03em;
        }

        .btn-minimal {
            background: none !important;
            border: none !important;
            color: black !important;
            padding: 0.4rem;
            font-size: 1.1rem;
            opacity: 0.4;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .btn-minimal.active { opacity: 1 !important; }
        .btn-minimal:hover { opacity: 1; transform: scale(1.1); }
        .btn-minimal:focus, .btn-minimal:active { 
            outline: none !important; 
            box-shadow: none !important; 
            transform: scale(1) !important; 
        }

        .vr-separator {
            width: 1px;
            height: 16px;
            background: rgba(0,0,0,0.08);
            margin: 0 0.3rem;
        }

        .dropdown-menu-dark {
            background-color: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            font-size: 0.9rem;
        }

        .hidden { display: none !important; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        @media (min-width: 576px) {
            .control-bar { bottom: 2rem; }
            .controls-pill { padding: 0.45rem 1.2rem; gap: 0.5rem; }
            .nom-display-large { font-size: 11rem; }
            /* Angepasst für Desktop */
            .stage { margin-top: -110px; }
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <!-- START PAGE -->
    <div class="container py-5 mt-5" id="deck-selection">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="display-4 mb-2 fw-bold">Superlearning</h1>
                <div id="user-display" class="auth-status-badge mb-5">Initializing...</div>
                
                <div class="card bg-dark border-secondary mb-5 shadow text-start">
                    <div class="card-body p-4">
                        <h5 class="card-title text-secondary mb-3 small text-uppercase fw-bold">Load shared deck</h5>
                        <div class="input-group">
                            <input value="9222f66f-6d0e-4b2d-bfdd-f31ebea71337" type="text" id="share-id-input" class="form-control bg-dark text-light border-secondary">
                            <button class="btn btn-primary px-4" onclick="app.loadSharedDeckById()">Load</button>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0 text-secondary text-start small text-uppercase fw-bold">My Decks</h5>
                    <button class="btn btn-sm btn-outline-secondary border-0" onclick="app.loadDecks()">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
                <div id="deck-list" class="list-group deck-card-list text-start mb-5"></div>
            </div>
        </div>
    </div>

    <!-- PLAY MODE -->
    <div id="learning-view">
        <div class="stage">
            <div id="nom-layer" class="layer"><div id="nom-display" class="nom-display-large"></div></div>
            <div id="details-layer" class="layer">
                <div id="nom-mini" class="nom-display-mini"></div>
                <div id="qatt-display" class="qatt-container"></div>
                <div id="quocngu-display" class="quocngu-text"></div>
            </div>
        </div>

        <div class="control-bar">
            <div class="controls-pill">
                <button class="btn-minimal" onclick="app.exitDeck()" title="Exit"><i class="bi bi-x-lg"></i></button>
                <div class="vr-separator"></div>
                
                <button id="speak-btn" class="btn-minimal" onclick="app.toggleAutoSpeak()" title="Speak"><i class="bi bi-volume-up"></i></button>
                <button id="binaural-btn" class="btn-minimal" onclick="app.toggleBinaural()" title="Binaural Alpha"><i class="bi bi-headphones"></i></button>
                
                <div class="vr-separator" id="music-separator"></div>
                
                <button id="prev-track-btn" class="btn-minimal" onclick="app.prevMusicTrack()" title="Prev Track"><i class="bi bi-chevron-left"></i></button>
                <button id="music-btn" class="btn-minimal" onclick="app.toggleMusic()" title="Play/Pause"><i class="bi bi-play-fill"></i></button>
                <button id="next-track-btn" class="btn-minimal" onclick="app.nextMusicTrack()" title="Next Track"><i class="bi bi-chevron-right"></i></button>
                
                <div class="vr-separator"></div>

                <div class="dropdown dropup">
                    <button class="btn-minimal" data-bs-toggle="dropdown" title="Settings"><i class="bi bi-gear"></i></button>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow border-0">
                        <li class="dropdown-header small text-uppercase">Script</li>
                        <li><button class="dropdown-item" onclick="app.setQattType('0')">QATT chính thể</button></li>
                        <li><button class="dropdown-item" onclick="app.setQattType('1')">QATT giản thể</button></li>
                    </ul>
                </div>
            </div>
            <div class="credits-container">
                <div id="audio-credits" class="audio-credits" onclick="app.nextMusicTrack()"></div>
            </div>
        </div>
    </div>

    <audio id="bg-audio"></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="qatt-dc/js/parser.js"></script>
    <script src="qatt-dc/js/renderer.js"></script>
    <script src="qatt-dc/js/supabase.js"></script>
    <script src="qatt-dc/js/navigation.js"></script>

    <script>
        class SuperlearningApp {
            constructor() {
                this.sp = new SupabaseService();
                this.parser = new VietnameseParser();
                this.renderer = new SvgGlyphRenderer();
                this.decks = [];
                this.currentDeck = null;
                this.currentIndex = 0;
                this.isShowingDetails = false;
                this.autoplayInterval = null;
                this.qattType = localStorage.qattType || "0";
                
                this.isMusicEnabled = localStorage.isMusicEnabled === 'true';
                this.isBinauralActive = localStorage.isBinauralEnabled === 'true';
                this.isAutoSpeakEnabled = localStorage.isAutoSpeakEnabled === 'true';
                
                this.playlist = [1, 4, 5, 6, 7, 12, 13, 14, 15, 16, 17];
                this.currentPlaylistIndex = 0;
                
                this.audioCtx = null;
                this.oscL = null; this.oscR = null;

                this.colors = ['hotpink', '#9b59b6', '#3498db', '#1abc9c', '#e67e22', '#e91e63', '#8e44ad', '#d35400'];
                this.currentColorIndex = 0;
                this.colorTimer = null;

                this.setupKeyboard();
                this.setupAudioEvents();
            }

            setupAudioEvents() {
                const audio = document.getElementById('bg-audio');
                audio.addEventListener('ended', () => this.nextMusicTrack());
            }

            setupKeyboard() {
                window.addEventListener('keydown', (e) => {
                    if (!this.currentDeck) return;
                    if (e.code === 'Space') { e.preventDefault(); this.toggleMusic(); }
                });
            }

            async init() {
                try {
                    await this.sp.init();
                    const username = this.sp.defaultUsername();
                    if(this.sp.user) document.getElementById('user-display').textContent = `User: ${username}`;
                    await this.loadDecks();
                } catch (err) { console.error(err); }
                finally { document.getElementById('loading').classList.add('hidden'); }
            }

            async loadDecks() {
                try {
                    this.decks = await this.sp.getDecks() || [];
                    const list = document.getElementById('deck-list');
                    list.innerHTML = '';
                    if (this.decks.length === 0) {
                        list.innerHTML = `<div class="border p-4 text-center text-secondary">No decks found.</div>`;
                        return;
                    }
                    this.decks.forEach(deck => {
                        const btn = document.createElement('button');
                        btn.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center';
                        btn.innerHTML = `<div><strong>${deck.title}</strong><br><span class="small text-secondary">${deck.count || 0} items</span></div><i class="bi bi-play-circle-fill fs-4 text-primary opacity-50"></i>`;
                        btn.onclick = () => this.startDeck(deck);
                        list.appendChild(btn);
                    });
                } catch (e) { console.error(e); }
            }

            async loadSharedDeckById(id) {
                const shareId = typeof id === 'string' ? id : document.getElementById('share-id-input').value.trim();
                if (!shareId) return;
                try {
                    const deck = await this.sp.getDeck(shareId);
                    if (deck) this.startDeck(deck);
                } catch (e) { console.error(e); }
            }

            startDeck(deck) {
                this.currentDeck = { ...deck, words: (deck.words || []).filter(w => w.n !== ".config") };
                this.currentIndex = 0;
                const view = document.getElementById('learning-view');
                view.style.display = 'flex';
                setTimeout(() => view.classList.add('active'), 10);
                document.body.style.overflow = 'hidden';
                
                this.currentPlaylistIndex = Math.floor(Math.random() * this.playlist.length);
                this.loadAndPlayTrack();

                document.getElementById('speak-btn').classList.toggle('active', this.isAutoSpeakEnabled);
                document.getElementById('binaural-btn').classList.toggle('active', this.isBinauralActive);
                this.updateMusicButtonUI();

                if (this.isBinauralActive) this.startBinaural(true);

                this.updateCard();
                this.startAutoplay();
                this.startColorCycle(); 
                this.updateCreditsUI();
            }

            exitDeck() {
                this.stopAutoplay();
                this.stopColorCycle(); 
                const view = document.getElementById('learning-view');
                view.classList.remove('active');
                setTimeout(() => { view.style.display = 'none'; }, 600);
                document.body.style.overflow = 'auto';
                this.currentDeck = null;
                document.getElementById('bg-audio').pause();
                this.stopBinaural(true);
                window.speechSynthesis.cancel();
            }

            startColorCycle() {
                if (this.colorTimer) clearInterval(this.colorTimer);
                const view = document.getElementById('learning-view');
                const updateBg = () => {
                    const color = this.colors[this.currentColorIndex];
                    view.style.backgroundColor = color;
                    this.currentColorIndex = (this.currentColorIndex + 1) % this.colors.length;
                };
                updateBg();
                this.colorTimer = setInterval(updateBg, 15000); 
            }

            stopColorCycle() { if (this.colorTimer) clearInterval(this.colorTimer); }

            updateCard() {
                if (!this.currentDeck || !this.currentDeck.words.length) return;
                const word = this.currentDeck.words[this.currentIndex];
                this.isShowingDetails = false;
                const nomDisplay = document.getElementById('nom-display');
                nomDisplay.textContent = word.n || "?";
                document.getElementById('nom-layer').classList.add("layer-show");
                document.getElementById('details-layer').classList.remove("layer-show");
            }

            flipInternal() {
                if (!this.currentDeck) return;
                const word = this.currentDeck.words[this.currentIndex];
                this.isShowingDetails = !this.isShowingDetails;
                const nomLayer = document.getElementById("nom-layer");
                const detailsLayer = document.getElementById("details-layer");
                
                if (this.isShowingDetails) {
                    const nomMini = document.getElementById('nom-mini');
                    const qnDisplay = document.getElementById('quocngu-display');
                    const qattDisplay = document.getElementById('qatt-display');
                    nomMini.textContent = word.n || "?";
                    qnDisplay.textContent = word.qn || "";
                    if (word.qn) {
                        const parts = this.parser.parse(word.qn);
                        if (parts) {
                            let code = parts.code;
                            if (this.qattType === "0") code = code.replace(",", ",+");
                            const el = document.createElement("div");
                            this.renderer.renderText(code, el, this.qattType);
                            qattDisplay.innerHTML = el.innerHTML;
							console.log(word.qn, code, this.qattType);
                        } else { qattDisplay.innerHTML = ""; }
                    } else { qattDisplay.innerHTML = ""; }
                    nomLayer.classList.remove("layer-show");
                    detailsLayer.classList.add("layer-show");
                    if (this.isAutoSpeakEnabled) this.speakWord();
                } else {
                    nomLayer.classList.add("layer-show");
                    detailsLayer.classList.remove("layer-show");
                }
            }

            startAutoplay() {
                if (this.autoplayInterval) return;
                this.autoplayInterval = setInterval(() => {
                    if (!this.isShowingDetails) { this.flipInternal(); }
                    else { this.currentIndex = (this.currentIndex + 1) % this.currentDeck.words.length; this.updateCard(); }
                }, 4000);
            }

            stopAutoplay() { if (this.autoplayInterval) { clearInterval(this.autoplayInterval); this.autoplayInterval = null; } }

            toggleMusic() {
                this.isMusicEnabled = !this.isMusicEnabled;
                localStorage.isMusicEnabled = this.isMusicEnabled;
                const audio = document.getElementById('bg-audio');
                this.isMusicEnabled ? audio.play().catch(() => {}) : audio.pause();
                this.updateMusicButtonUI();
                this.updateCreditsUI();
            }

            updateMusicButtonUI() {
                const btn = document.getElementById('music-btn');
                btn.innerHTML = this.isMusicEnabled ? '<i class="bi bi-pause-fill"></i>' : '<i class="bi bi-play-fill"></i>';
                btn.classList.toggle('active', this.isMusicEnabled);
                document.getElementById('prev-track-btn').classList.toggle('hidden', !this.isMusicEnabled);
                document.getElementById('next-track-btn').classList.toggle('hidden', !this.isMusicEnabled);
            }

            nextMusicTrack() { this.currentPlaylistIndex = (this.currentPlaylistIndex + 1) % this.playlist.length; this.loadAndPlayTrack(); }
            prevMusicTrack() { this.currentPlaylistIndex = (this.currentPlaylistIndex - 1 + this.playlist.length) % this.playlist.length; this.loadAndPlayTrack(); }

            loadAndPlayTrack() {
                const trackNum = this.playlist[this.currentPlaylistIndex];
                const audio = document.getElementById('bg-audio');
                audio.src = `https://www.soundhelix.com/examples/mp3/SoundHelix-Song-${trackNum}.mp3`;
                audio.load();
                if (this.isMusicEnabled) audio.play();
                this.updateCreditsUI();
            }

            updateCreditsUI() {
                const credits = document.getElementById('audio-credits');
                let content = "";
                if (this.isMusicEnabled) {
                    const trackNum = this.playlist[this.currentPlaylistIndex];
                    content += `<i class="bi bi-shuffle"></i> SoundHelix Song ${trackNum}`;
                }
                if (this.isBinauralActive) {
                    if (content) content += " • ";
                    content += `<span class="alpha-badge">Alpha 10Hz</span>`;
                }
                credits.innerHTML = content;
                credits.classList.toggle('visible', content !== "");
            }

            toggleAutoSpeak() {
                this.isAutoSpeakEnabled = !this.isAutoSpeakEnabled;
                localStorage.isAutoSpeakEnabled = this.isAutoSpeakEnabled;
                document.getElementById('speak-btn').classList.toggle('active', this.isAutoSpeakEnabled);
            }

            speakWord() {
                const word = this.currentDeck.words[this.currentIndex];
                const utterance = new SpeechSynthesisUtterance(word.qn);
                utterance.lang = 'vi-VN'; utterance.rate = 0.8;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }

            toggleBinaural() {
                this.isBinauralActive = !this.isBinauralActive;
                localStorage.isBinauralEnabled = this.isBinauralActive;
                this.isBinauralActive ? this.startBinaural() : this.stopBinaural();
                document.getElementById('binaural-btn').classList.toggle('active', this.isBinauralActive);
                this.updateCreditsUI();
            }

            startBinaural(forceResume = false) {
                if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                this.stopBinaural(true);
                this.oscL = this.audioCtx.createOscillator();
                this.oscR = this.audioCtx.createOscillator();
                const panL = this.audioCtx.createStereoPanner();
                const panR = this.audioCtx.createStereoPanner();
                const gain = this.audioCtx.createGain();
                this.oscL.frequency.value = 200; this.oscR.frequency.value = 210; 
                panL.pan.value = -1; panR.pan.value = 1; gain.gain.value = 0.05; 
                this.oscL.connect(panL).connect(gain); this.oscR.connect(panR).connect(gain);
                gain.connect(this.audioCtx.destination);
                this.oscL.start(); this.oscR.start();
            }

            stopBinaural(internalOnly = false) {
                if (this.oscL) { this.oscL.stop(); this.oscR.stop(); this.oscL = null; this.oscR = null; }
                if (!internalOnly) this.isBinauralActive = false;
            }

            setQattType(type) { this.qattType = type; localStorage.qattType = type; this.updateCard(); }
        }

        const app = new SuperlearningApp();
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
